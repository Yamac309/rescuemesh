services:
  backend:
    build: ./backend
    environment:
      RESCUEMESH_NODE_NAME: RescueMesh Docker Node
      RESCUEMESH_DB_PATH: /data/rescuemesh.db
    ports:
      - "8000:8000"
    volumes:
      - rescuemesh-data:/data

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  rescuemesh-data:
