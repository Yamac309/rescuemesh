services:
  - type: web
    name: rescuemesh
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: RESCUEMESH_PUBLIC_MODE
        value: "true"
      - key: RESCUEMESH_NODE_NAME
        value: RescueMesh Public Node
      - key: RESCUEMESH_ADMIN_TOKEN
        sync: false
      - key: RESCUEMESH_RESPONDER_TOKEN
        sync: false
      - key: RESCUEMESH_REQUIRE_HTTPS
        value: "true"
      - key: RESCUEMESH_DISABLE_RATE_LIMITING
        value: "false"
